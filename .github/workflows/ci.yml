name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.13
          cache: yarn

      - name: Instalar dependências
        run: yarn install --frozen-lockfile

      - name: Rodar testes
        run: yarn test

      - name: Type check
        run: npx tsc --noEmit
